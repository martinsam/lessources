{{ $src := .Get "src" }}
{{ $img := resources.Get $src }}

{{ if not $img }}
  ERROR: image {{ $src }} not found in assets
{{ else }}

{{ $size := .Get "size" | default "800x" }}
{{ $resized := $img.Resize $size }}

<figure>
  <img src="{{ $resized.RelPermalink }}"
       width="{{ $resized.Width }}"
       height="{{ $resized.Height }}"
       style="height: auto;"
       alt="{{ .Get "title" }}">
  <figcaption>{{ .Get "title" }}</figcaption>
</figure>

{{ end }}
